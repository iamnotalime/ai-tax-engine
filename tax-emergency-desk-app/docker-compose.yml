services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taxdesk
    ports:
      - "5432:5432"
    volumes:
      - taxdesk_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taxdesk"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  taxdesk_pg:
